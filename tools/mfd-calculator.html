<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111314" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MFD Calc" />
  <title>MFD Calculator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:         #111314;
      --surface:    #1C1F22;
      --inset:      #0D0F11;
      --amber:      #E8A020;
      --amber-dim:  #7A520F;
      --text:       #F0EEE8;
      --muted:      #7A7D82;
      --border:     #2C2F33;
      --danger:     #C94040;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px 20px;
      gap: 0;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 400px;
      margin-bottom: 28px;
      text-align: left;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 4px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Inputs ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    label .unit {
      font-size: 11px;
      font-weight: 500;
      color: var(--amber-dim);
      text-transform: none;
      letter-spacing: 0;
    }

    input[type="number"] {
      width: 100%;
      height: 58px;
      background: var(--inset);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 26px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      padding: 0 16px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      border-color: var(--amber);
    }

    input[type="number"]::placeholder {
      color: var(--border);
    }

    /* ── Formula reminder ── */
    .formula {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      padding: 10px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-family: "Courier New", Courier, monospace;
      letter-spacing: 0.05em;
    }

    .formula strong {
      color: var(--amber-dim);
    }

    /* ── Readout ── */
    .readout {
      background: var(--inset);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 20px 16px;
      text-align: center;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: border-color 0.2s;
    }

    .readout.has-value {
      border-color: var(--amber-dim);
    }

    .readout.error {
      border-color: var(--danger);
    }

    .result-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-value {
      font-family: "Courier New", Courier, monospace;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      color: var(--muted);
      letter-spacing: -0.02em;
      transition: color 0.2s, text-shadow 0.2s;
    }

    .result-value.lit {
      color: var(--amber);
      text-shadow: 0 0 28px rgba(232, 160, 32, 0.35), 0 0 8px rgba(232, 160, 32, 0.2);
    }

    .result-value.error-text {
      color: var(--danger);
      font-size: 18px;
      text-shadow: none;
    }

    .result-unit {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--amber-dim);
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .result-unit.visible {
      opacity: 1;
    }

    /* ── Footer note ── */
    footer {
      width: 100%;
      max-width: 400px;
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Field Tool</p>
    <h1>Capacitor Check <span>/ MFD</span></h1>
  </header>

  <div class="card">

    <div class="field">
      <label for="amps">
        Measured Amps
        <span class="unit">A</span>
      </label>
      <input
        type="number"
        id="amps"
        inputmode="decimal"
        placeholder="0.00"
        step="0.01"
        min="0"
        autocomplete="off"
      />
    </div>

    <div class="field">
      <label for="volts">
        Supply Voltage
        <span class="unit">V</span>
      </label>
      <input
        type="number"
        id="volts"
        inputmode="decimal"
        placeholder="0"
        step="1"
        min="0"
        autocomplete="off"
      />
    </div>

    <div class="formula">
      MFD &nbsp;=&nbsp; <strong>( A × 2650 ) / V</strong>
    </div>

    <div class="readout" id="readout">
      <span class="result-label">Actual Capacitance</span>
      <span class="result-value" id="result">—</span>
      <span class="result-unit" id="result-unit">MFD</span>
    </div>

  </div>

  <footer>
    Enter amps and volts above — result updates live.<br>
    Add to Home Screen for offline use.
  </footer>

  <script>
    const ampsInput  = document.getElementById('amps');
    const voltsInput = document.getElementById('volts');
    const readout    = document.getElementById('readout');
    const result     = document.getElementById('result');
    const resultUnit = document.getElementById('result-unit');

    function calculate() {
      const a = parseFloat(ampsInput.value);
      const v = parseFloat(voltsInput.value);

      // Reset state
      readout.classList.remove('has-value', 'error');
      result.classList.remove('lit', 'error-text');
      resultUnit.classList.remove('visible');

      // Both fields empty — idle state
      if (ampsInput.value === '' && voltsInput.value === '') {
        result.textContent = '—';
        return;
      }

      // Validation
      if (isNaN(a) || isNaN(v)) {
        return;
      }

      if (v === 0) {
        readout.classList.add('error');
        result.classList.add('error-text');
        result.textContent = 'Voltage cannot be 0';
        return;
      }

      if (a < 0 || v < 0) {
        readout.classList.add('error');
        result.classList.add('error-text');
        result.textContent = 'Values must be positive';
        return;
      }

      const mfd = (a * 2650) / v;

      readout.classList.add('has-value');
      result.classList.add('lit');
      resultUnit.classList.add('visible');

      // Format: show 2 decimal places
      result.textContent = mfd.toFixed(2);
    }

    ampsInput.addEventListener('input', calculate);
    voltsInput.addEventListener('input', calculate);

    // Pre-focus amps on load
    ampsInput.focus();
  </script>

</body>
</html>
